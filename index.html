<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WallStreet Calculator</title>
  <style>
    *{box-sizing:border-box}
    html, body{
      height:100%;
      margin:0;
    }
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
      background:linear-gradient(180deg,#0e1015,#141a25);
      background-attachment:fixed;
      color:#f2f4f8;
    }
    .container{
      max-width:1000px;
      margin:60px auto;
      padding:0 20px;
    }
    h1{margin-bottom:40px;font-weight:600;}
    .section{margin-bottom:40px;}
    .inputs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }
    input{
      background:#1c2330;
      border:1px solid #2e394d;
      border-radius:16px;
      padding:18px;
      font-size:18px;
      color:#fff;
      transition:.25s ease;
    }
    input:hover{transform:scale(1.03)}
    input:focus{
      outline:none;
      border-color:#4f7cff;
      box-shadow:0 0 0 2px rgba(79,124,255,.2);
    }
    .snapshot{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }
    .card{
      background:#1c2330;
      border:1px solid #2e394d;
      border-radius:22px;
      padding:30px;
      transition:.25s ease;
    }
    .card:hover{
      transform:scale(1.04);
      border-color:#4f7cff;
    }
    .label{font-size:12px;opacity:.6;margin-bottom:8px;}
    .value{font-size:44px;font-weight:600;}
    .analysis{
      background:#1c2330;
      border:1px solid #2e394d;
      border-radius:22px;
      padding:25px;
      line-height:1.55;
    }
    .status{font-size:20px;font-weight:700;margin-bottom:8px;}
    .priority{margin-bottom:14px;font-weight:600;}
    .low{color:#4caf50}
    .medium{color:#ffc107}
    .high{color:#ff7043}
    .critical{color:#ff5252}
    .sectionTitle{font-weight:700;margin-top:16px;margin-bottom:8px;}
    .step{margin:4px 0;}
    .small{
      font-size:13px;
      opacity:.78;
      margin-top:14px;
    }
    .note{opacity:.9;}
  </style>
</head>
<body>
  <div class="container">
    <h1>WallStreet Calculator</h1>

    <div class="section">
      <div class="inputs">
        <input id="arrivals" type="number" placeholder="Arrivals" min="0">
        <input id="recruited" type="number" placeholder="Recruited" min="0">
        <input id="incity" type="number" placeholder="In-City" min="0">
      </div>
    </div>

    <div class="section snapshot">
      <div class="card">
        <div class="label">RECRUITMENT RATE</div>
        <div class="value" id="rateVal">0%</div>
      </div>
      <div class="card">
        <div class="label">BEGINNER LOSS RATE</div>
        <div class="value" id="lossVal">0%</div>
      </div>
      <div class="card">
        <div class="label">BEGINNERS LOST</div>
        <div class="value" id="lostVal">0</div>
      </div>
    </div>

    <div class="section">
      <div class="analysis" id="analysisBox">
        Enter numbers to view operational guidance.
      </div>
    </div>
  </div>

<script>
  function makeSteps(arr) {
    return arr.map(step => `<div class="step">• ${step}</div>`).join("");
  }

  function analyse() {
    const arrivals = Number(document.getElementById("arrivals").value) || 0;
    const recruited = Number(document.getElementById("recruited").value) || 0;
    const inCity = Number(document.getElementById("incity").value) || 0;

    const lost = Math.max(arrivals - recruited - inCity, 0);
    const recruitmentRate = arrivals > 0 ? (recruited / arrivals) * 100 : 0;
    const beginnerLossRate = arrivals > 0 ? (lost / arrivals) * 100 : 0;
    const clearedRate = arrivals > 0 ? ((recruited + inCity) / arrivals) * 100 : 0;

    document.getElementById("lostVal").textContent = lost;
    document.getElementById("rateVal").textContent = recruitmentRate.toFixed(1) + "%";
    document.getElementById("lossVal").textContent = beginnerLossRate.toFixed(1) + "%";

    let status = "";
    let priority = "";
    let priorityClass = "";
    let action = "";
    let reason = "";
    let steps = [];
    let clearPanelText = "";
    let note = "";

    // No active flow
    if (arrivals === 0 && recruited === 0 && inCity === 0) {
      status = "No active flow";
      priority = "Low";
      priorityClass = "low";
      action = "Keep supervision at pier and remain ready for peak time.";
      reason = "There is no current panel pressure.";
      steps = [
        "Keep WS at pier",
        "Be ready for beginners flying in",
        "Do not spread out without a reason"
      ];
      clearPanelText = "There is no panel to clear right now.";
      note = "There is no need to spread out at the moment. Keep WS at pier and be ready to pick beginners up as they come in.";
    }

    // Panel stacked + high beginner loss
    else if (inCity >= 7 && beginnerLossRate >= 25) {
      status = "Panel stacked and beginner loss is high";
      priority = "Critical";
      priorityClass = "critical";
      action = "Clear the in-city panel and stabilise immediately.";
      reason = "The panel is stacked and beginner loss is already high, so this needs dealing with now to prevent further loss.";
      steps = [
        "Recruit beginners in-city immediately",
        "Help beginners that have been in city for the longest first",
        "Keep enough members at pier for new arrivals",
        "Stabilise recruitment and beginners entering after clearing panel"
      ];
      clearPanelText = `If panel is cleared now, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`;
      note = "This is no longer just a stacked panel. Beginners have already been lost, so the priority is to clear those still in city and prevent further loss.";
    }

    // Panel stacked + medium beginner loss
    else if (inCity >= 7 && beginnerLossRate >= 18) {
      status = "Panel stacked and loss is rising";
      priority = "High";
      priorityClass = "high";
      action = "Clear the in-city panel before more beginners are lost.";
      reason = "The panel is stacked and beginner loss is already starting to rise.";
      steps = [
        "Recruit beginners in-city immediately",
        "Help beginners that have been in city for the longest first",
        "Keep enough at pier for new arrivals",
        "Balance WallStreet through Pier and Dots when panel cleared"
      ];
      clearPanelText = `If panel is cleared now, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`;
      note = "The panel is stacked and beginner loss is already rising. Help beginners that have been in city for the longest first before more of them get bored and leave.";
    }

    // Panel stacked only
    else if (inCity >= 7) {
      status = "Panel stacked";
      priority = "High";
      priorityClass = "high";
      action = "Clear the beginners off panel in city.";
      reason = "Too many beginners are sitting in-city and need to be helped before they leave.";
      steps = [
        "Recruit beginners in-city immediately",
        "Help beginners that have been in city for the longest first",
        "Keep enough at pier for new arrivals",
        "Balance WallStreet through Pier and Dots when panel cleared"
      ];
      clearPanelText = `If panel is cleared now, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`;
      note = "A stacked panel means beginners need to be helped before they get bored and leave. Prioritise the oldest beginners first.";
    }

    // Panel building + high beginner loss
    else if (inCity >= 4 && beginnerLossRate >= 25) {
      status = "Panel building and beginner loss is high";
      priority = "High";
      priorityClass = "high";
      action = "Recruit Beginners currently in city + Control beginners flying in at pier";
      reason = "Beginner loss is already too high and the panel is still building.";
      steps = [
        "Keep pier properly covered",
        "Clear red + green dots",
        "Help beginners that have been in city for the longest first",
        "Do not let the panel keep stacking"
      ];
      clearPanelText = `If current in-city beginners are recruited, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`;
      note = "Beginners have already been lost and the panel is still building. Clear panel and monitor panel before the situation gets worse.";
    }

    // Panel building
    else if (inCity >= 4) {
      status = "Panel building";
      priority = "Medium";
      priorityClass = "medium";
      action = "Split beginner coverage between pier and F1 panel.";
      reason = "The panel is starting to build and needs dealing with early.";
      steps = [
        "Keep pier covered",
        "Spread WallStreet onto dots",
        "Help beginners that have been in city for the longest first",
        "Stop the panel from stacking further - Recruit efficiently"
      ];
      clearPanelText = `If current in-city beginners are recruited, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`;
      note = "The panel is building. Deal with it early so beginners are not left sitting long enough to get bored and leave.";
    }

    // High beginner loss
    else if (beginnerLossRate >= 25) {
      status = "Beginner loss is too high";
      priority = "Critical";
      priorityClass = "critical";
      action = "Get on dots and recruit the beginners still in city.";
      reason = "Too many beginners have already been lost and the current flow needs recovering.";
      steps = [
        "Make sure pier is properly covered",
        "Recruit the beginners still in city as quickly as possible",
        "Help the oldest waiting beginners first",
        "Stop anything unnecessary until numbers settle"
      ];
      clearPanelText = inCity > 0
        ? `If current in-city beginners are recruited, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`
        : "This is mainly a coverage issue rather than a panel issue right now.";
      note = "At this stage some beginners have already been lost because they were not helped, got bored and left. The priority now is to stabilise and improve the flow from here.";
    }

    // Medium beginner loss
    else if (beginnerLossRate >= 18) {
      status = "Do not let more beginners get bored and leave";
      priority = "Medium";
      priorityClass = "medium";
      action = "Clear current panel";
      reason = "Beginner loss is starting to rise and needs correcting now.";
      steps = [
        "Recruit faster and more efficiently",
        "Watch pier more closely",
        "Help the beginners that have been in city for the longest",
        "Do not let beginners explore alone or they will get bored and leave"
      ];
      clearPanelText = inCity > 0
        ? `If current in-city beginners are recruited, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`
        : "There is no significant panel to clear at the moment.";
      note = "This is the warning stage. If beginners are not helped quickly enough, they get bored and start leaving.";
    }

    // Good position
    else {
      status = inCity <= 1 ? "Pier focus" : "Panel under control";
      priority = "Low";
      priorityClass = "low";
      action = inCity <= 1
        ? "Keep the main focus at pier."
        : "Keep recruiting efficiently.";
      reason = inCity <= 1
        ? "Beginner loss is in a good range and there is little in-city pressure."
        : "Beginner loss is in a good range and the panel is manageable.";
      steps = inCity <= 1
        ? [
            "Keep most people at pier",
            "Recruit beginners efficiently",
            "Only get people on dots if panel starts to stack",
            "Stay prepared for peak time (6-10pm)"
          ]
        : [
            "Keep pier supervised",
            "Keep checking in-city",
            "Help beginners that have been in city for the longest first",
            "Do not let the panel build unnecessarily"
          ];
      clearPanelText = inCity > 0
        ? `If current in-city beginners are recruited, recruitment would rise to <strong>${clearedRate.toFixed(1)}%</strong>.`
        : "Panel is already in a good position.";
      note = "This is a good position, but beginners still need to be helpd + recruited so they are not left waiting, get bored and leave.";
    }

    document.getElementById("analysisBox").innerHTML = `
      <div class="status">${status}</div>
      <div class="priority ${priorityClass}">Priority: ${priority}</div>

      <div class="sectionTitle">Action</div>
      ${action}

      <div class="sectionTitle">Reason</div>
      <div class="note">${reason}</div>

      <div class="sectionTitle">Steps</div>
      ${makeSteps(steps)}

      <div class="sectionTitle">If panel cleared now</div>
      ${clearPanelText}

      <div class="small">${note}</div>
    `;
  }

  document.getElementById("arrivals").addEventListener("input", analyse);
  document.getElementById("recruited").addEventListener("input", analyse);
  document.getElementById("incity").addEventListener("input", analyse);
</script>
</body>
</html>
